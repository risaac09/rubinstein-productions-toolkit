site_name: Rubinstein Productions — Internal
site_description: Strategy, operations, methodology, and learning for RP
site_author: Isaac Rubinstein
site_url: ""

theme:
  name: material
  palette:
    scheme: default
    primary: custom
    accent: custom
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - toc.integrate

extra_css:
  - stylesheets/rp-theme.css

nav:
  - Home: index.md
  - Digital Architecture: architecture.md
  - Visual Assets: visual-assets.md
  - Strategy:
    - Mission & Positioning: strategy/mission-and-positioning.md
    - Theory of Change: strategy/theory-of-change.md
    - Target Market & Competitive Landscape: strategy/competitive-landscape.md
    - Brand Identity: strategy/brand-identity.md
    - Phase Roadmap: strategy/phase-roadmap.md
  - Marketing & Content:
    - Charter: marketing/index.md
  - Business Development:
    - Charter: business-development/index.md
  - People & Practice:
    - Charter: people/index.md
  - Operations:
    - Engagement Lifecycle SOPs: operations/engagement-lifecycle.md
    - Pricing Guardrails: operations/pricing-guardrails.md
    - Capacity Management: operations/capacity-management.md
    - Client Communication Standards: operations/client-communication.md
    - Equipment & Logistics: operations/equipment-logistics.md
    - Financial Operations: operations/financial-operations.md
    - Decision Frameworks: operations/decision-frameworks.md
  - Learning & Development:
    - Methodology Deep-Dive — Four Phases: learning/four-phases.md
    - Methodology Deep-Dive — Bilingual Dashboard: learning/bilingual-dashboard.md
    - Facilitation Principles: learning/facilitation-principles.md
    - Camera-Shipping Model: learning/camera-shipping-model.md
    - Case Study Library: learning/case-study-library.md
    - Reading List & Intellectual Lineage: learning/reading-list.md
  - Onboarding:
    - Welcome to RP: onboarding/welcome.md
    - Who We Are: onboarding/who-we-are.md
    - How We Work: onboarding/how-we-work.md
    - Tools & Systems: onboarding/tools-and-systems.md
    - First Week Checklist: onboarding/first-week-checklist.md
  - IT Department:
    - Charter & Service Catalog: it/index.md
    - Systems & Runbooks: it/systems.md
    - Security & Continuity: it/security.md
    - Roadmap: it/roadmap.md
    - Incident Log: it/incidents.md
  - R&D / Innovation:
    - Charter: innovation/index.md
    - Originality Factor: innovation/originality-factor.md
    - Experiments Log: innovation/experiments.md
    - Research Log: innovation/research-log.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji
